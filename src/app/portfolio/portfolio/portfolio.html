<div class="min-h-screen bg-base-100 text-base-content">
  <div class="mx-auto max-w-6xl px-6 py-10 lg:px-10">
    <!-- Two-column layout -->
    <div class="grid gap-10 lg:grid-cols-[320px_1fr]">
      <aside>
        <app-sidebar [data]="data" />
      </aside>

      <main>
        <!-- Tabs -->
        <div role="tablist" class="tabs tabs-border mb-8">
          @for (tab of tabs; track tab.id) {
            <button
              role="tab"
              type="button"
              class="tab text-xl font-semibold"
              [class.tab-active]="activeTab() === tab.id"
              [attr.aria-selected]="activeTab() === tab.id"
              (click)="selectTab(tab.id)"
            >
              {{ tab.label }}
            </button>
          }
        </div>

        <!-- Active tab content -->
        @switch (activeTab()) {
          @case ('about') {
            <app-about [data]="data" />
          }
          @case ('skills') {
            <app-skills [groups]="data.skillGroups" />
          }
          @case ('achievements') {
            <app-achievements [items]="data.selectedProjects" [highlights]="data.highlights" />
          }
          @case ('projects') {
            <app-projects [items]="data.projects" />
          }
        }
      </main>
    </div>
  </div>
</div>
