<section>
  <h2 class="text-3xl font-bold">My Services</h2>
  <p class="mt-1 text-base-content/60">Checkout services offered by me</p>

  <!-- Notion-like toolbar -->
  <div class="mt-5 flex items-center justify-between gap-2">
    <span class="badge gap-1.5 border-base-content/15 bg-base-200/60 py-3">
      <span aria-hidden="true">🗂️</span> Services
    </span>
    <div class="flex items-center gap-1 text-base-content/50">
      @for (glyph of toolbarGlyphs; track glyph) {
        <button
          type="button"
          class="btn btn-ghost btn-xs btn-square"
          [attr.aria-label]="glyph.label"
        >
          {{ glyph.icon }}
        </button>
      }
      <button type="button" class="btn btn-primary btn-sm ml-1">New</button>
    </div>
  </div>

  <!-- Service cards -->
  <div class="mt-3 grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
    @for (item of items(); track item.label) {
      <button
        type="button"
        class="flex items-center gap-2.5 rounded-lg border border-base-content/10
               bg-base-200/40 px-4 py-3 text-left transition hover:bg-base-200"
      >
        <span aria-hidden="true">{{ item.icon }}</span>
        <span class="text-sm">{{ item.label }}</span>
      </button>
    }
    <button
      type="button"
      class="flex items-center justify-center gap-2 rounded-lg border border-dashed
             border-base-content/15 px-4 py-3 text-sm text-base-content/50
             transition hover:bg-base-200/40"
    >
      <span aria-hidden="true">＋</span> New page
    </button>
  </div>
</section>
