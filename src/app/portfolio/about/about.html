<section class="flex flex-col gap-10">
  <div>
    <p class="max-w-2xl leading-relaxed text-base-content/80 text-justify">
      {{ data().about }}
    </p>

    @if (data().whatIDo.length) {
      <div class="mt-6">
        <h3 class="mb-3 text-lg font-semibold text-base-content/70 ">What I do</h3>
        <ul class="flex flex-col gap-2">
          @for (item of data().whatIDo; track item) {
            <li class="flex gap-2.5 text-sm text-base-content/80 text-justify">
              <span class="mt-1 text-primary" aria-hidden="true">▸</span>
              <span class="max-w-2xl">{{ item }}</span>
            </li>
          }
        </ul>
      </div>
    }

    <div class="mt-6 grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
      @for (link of data().links; track link.url) {
        <a
          [href]="link.url"
          target="_blank"
          rel="noopener"
          class="flex items-center gap-3 rounded-xl border border-base-content/10
                 bg-base-200/40 px-4 py-3 transition hover:bg-base-200"
        >
          <app-icon [name]="link.icon" />
          <span class="truncate text-sm text-base-content/80 underline-offset-2 hover:underline">
            {{ link.label }}
          </span>
        </a>
      }

      <app-email-reveal [user]="data().email.user" [domain]="data().email.domain" />
    </div>
  </div>

  <div>
    <h3 class="mb-5 text-lg font-semibold text-base-content/70">Experience</h3>
    <app-cv-timeline [entries]="cv" />
  </div>
</section>
