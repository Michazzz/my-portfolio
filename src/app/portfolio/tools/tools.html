<section>
  <h2 class="mb-5 text-3xl font-bold">Tools</h2>
  <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
    @for (item of items(); track item.label) {
      <div
        class="flex items-center gap-2.5 rounded-lg border border-base-content/10
               bg-base-200/40 px-4 py-3"
      >
        <span aria-hidden="true">{{ item.icon }}</span>
        <span class="text-sm">{{ item.label }}</span>
      </div>
    }
  </div>
</section>
